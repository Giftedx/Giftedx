<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 360" width="1280" height="360" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#0f2430"/><stop offset="1" stop-color="#1a3a4a"/></linearGradient>
    <linearGradient id="benhill" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#27475a"/><stop offset="1" stop-color="#1d3848"/></linearGradient>
    <linearGradient id="heatherridge" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#5b4f6b"/><stop offset="1" stop-color="#463c54"/></linearGradient>
  </defs>
  <rect width="1280" height="360" fill="url(#sky)"/>

  <!-- stars -->
  <g fill="#f5f0e8">
    <circle cx="240" cy="48" r="1.8" opacity="0.7"/><circle cx="420" cy="76" r="1.4" opacity="0.5"/><circle cx="600" cy="40" r="1.8" opacity="0.65"/>
    <circle cx="760" cy="84" r="1.4" opacity="0.5"/><circle cx="900" cy="36" r="1.8" opacity="0.7"/><circle cx="1020" cy="92" r="1.4" opacity="0.45"/>
    <circle cx="520" cy="110" r="1.2" opacity="0.4"/><circle cx="690" cy="128" r="1.2" opacity="0.4"/><circle cx="140" cy="100" r="1.4" opacity="0.5"/>
  </g>

  <!-- moon, high and clear -->
  <circle cx="1170" cy="74" r="34" fill="#f5f0e8" opacity="0.92"/>
  <circle cx="1158" cy="67" r="30" fill="#0f2430" opacity="0.45"/>

  <!-- distant ben, a true silhouette low on the horizon -->
  <path d="M620 280 Q 850 140 1090 252 Q 1190 296 1280 282 L1280 360 L620 360 Z" fill="url(#benhill)"/>
  <path d="M0 282 Q 200 226 410 268 Q 540 292 660 282 L660 360 L0 360 Z" fill="url(#benhill)" opacity="0.85"/>

  <!-- heather ridge -->
  <path d="M0 302 C 240 270, 480 312, 720 296 S 1100 272, 1280 300 L1280 360 L0 360 Z" fill="url(#heatherridge)"/>

  <!-- peat foreground -->
  <path d="M0 330 C 300 312, 600 340, 900 328 S 1180 316, 1280 328 L1280 360 L0 360 Z" fill="#2e2418"/>

  <!-- the wee kittiwake over the title -->
  <g stroke="#f5f0e8" fill="none" stroke-linecap="round">
    <g stroke-width="4.5" opacity="0.95"><path d="M180 78 q 16 -14 32 0"/><path d="M212 78 q 16 -14 32 0"/></g>
    <g stroke-width="3.5" opacity="0.6"><path d="M300 110 q 12 -10 24 0"/><path d="M324 110 q 12 -10 24 0"/></g>
  </g>

  <!-- TEXT ZONE -->
  <text x="80" y="186" font-size="92" font-weight="800" fill="#f5f0e8" letter-spacing="0.5">Giftedx</text>
  <text x="84" y="232" font-size="23" font-weight="600" fill="#89b4c4" letter-spacing="5">SYSTEMS &#183; GAMES &#183; A WEE BIT OF SCOTLAND</text>
</svg>
